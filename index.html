<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            margin-bottom: 40px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 80%;
            max-width: 800px;
        }

        a {
            text-decoration: none;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            background: #334155;
            transform: translateY(-5px);
        }

        .title {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1>My Portfolio</h1>

    <div class="container">

        <a href="/baby-distribute-proj/index.html">
            <div class="card">
                <div class="title">baby-distribute-proj</div>
            </div>
        </a>

    </div>

</body>
</html>
